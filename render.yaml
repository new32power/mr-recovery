services:
  - type: web
    name: mr-recovery-api
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: artifacts/api-server
    buildCommand: echo "using pre-built dist"
    startCommand: node --enable-source-maps dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: MASTER_ADMIN_EMAIL
        value: s39452363@gmail.com
      - key: NEON_DATABASE_URL
        sync: false
      - key: APP_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: JWT_SECRET
        sync: false
